name: Weekly Backup

on:
  schedule:
    - cron: "0 7 * * 0"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Check secrets presence
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "SUPABASE_URL is empty"
            exit 1
          fi

          if [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "SUPABASE_SERVICE_ROLE_KEY is empty"
            exit 1
          fi

          echo "Secrets exist"

      - name: Test animal_reports request
        run: |
          echo "Testing animal_reports..."
          curl --show-error --location --max-time 120 \
            "${{ secrets.SUPABASE_URL }}/rest/v1/animal_reports?select=*&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Accept: application/json" \
            -w "\nHTTP_STATUS:%{http_code}\n"

      - name: Test report_comments request
        run: |
          echo "Testing report_comments..."
          curl --show-error --location --max-time 120 \
            "${{ secrets.SUPABASE_URL }}/rest/v1/report_comments?select=*&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Accept: application/json" \
            -w "\nHTTP_STATUS:%{http_code}\n"

      - name: Test report_history request
        run: |
          echo "Testing report_history..."
          curl --show-error --location --max-time 120 \
            "${{ secrets.SUPABASE_URL }}/rest/v1/report_history?select=*&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Accept: application/json" \
            -w "\nHTTP_STATUS:%{http_code}\n"